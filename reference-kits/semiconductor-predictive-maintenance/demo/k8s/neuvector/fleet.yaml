# SUSE Security (NeuVector) — real runtime container security with a web console.
# Deployed by Fleet straight from the upstream Helm chart (this is how SUSE ships
# it). Pinned to chart 2.8.13 = NeuVector 5.5.1, matching the SUSE Edge 3.6.0
# matrix in the hand-off kit. Its own namespace + release, so it never collides
# with the base/ai bundles.
#
# Tuned for a single-node laptop demo: 1 controller (not the HA default of 3),
# k3s containerd socket wired in so the Enforcer can inspect traffic, and the
# CVE auto-updater cron left on its default (the Scanner image carries a baseline
# DB, so the console works offline).
defaultNamespace: neuvector

helm:
  releaseName: neuvector
  takeOwnership: true
  repo: https://neuvector.github.io/neuvector-helm/
  chart: core
  version: 2.8.13
  values:
    # k3s runtime so the Enforcer DaemonSet can find containerd on this cluster.
    k3s:
      enabled: true
      runtimePath: /run/k3s/containerd/containerd.sock
    # Single-node footprint: one controller instead of the 3-replica HA default.
    controller:
      replicas: 1
      pvc:
        enabled: false
    # Manager web console (HTTPS 8443). ClusterIP + we port-forward it, matching
    # how the demo exposes Open WebUI.
    manager:
      enabled: true
      svc:
        type: ClusterIP
    # RBAC + CRDs come from the chart.
    rbac: true
