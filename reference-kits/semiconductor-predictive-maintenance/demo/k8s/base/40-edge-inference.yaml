# edge-inference — on-prem predictive-maintenance inference + ops dashboard.
# The SUSE AI analog (CPU-only here; production swaps in Ollama/vLLM on a GPU).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-inference
  namespace: fab-edge
  labels: { app: edge-inference, tier: inference }
spec:
  replicas: 1
  selector: { matchLabels: { app: edge-inference } }
  template:
    metadata:
      labels: { app: edge-inference, tier: inference }
    spec:
      containers:
        - name: edge-inference
          image: edge-proof/edge-inference:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
          env:
            - { name: MQTT_HOST, value: mosquitto }
            - { name: MQTT_PORT, value: "1883" }
            - { name: WARMUP, value: "30" }
            # Points at the optional SUSE AI tier. Harmless when that tier isn't
            # deployed — /api/explain then returns a clear "AI tier not reachable,
            # run make ai" note. The AI profile (k8s/ai) adds the ollama Service.
            - { name: OLLAMA_URL, value: "http://ollama:11434" }
            - { name: OLLAMA_MODEL, value: "qwen2.5:0.5b" }
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edge-inference
  namespace: fab-edge
  labels: { app: edge-inference }
spec:
  type: NodePort
  selector: { app: edge-inference }
  ports:
    - { port: 8080, targetPort: 8080, nodePort: 30080, name: http }
