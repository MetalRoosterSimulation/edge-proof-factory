# Fleet (Rancher GitOps) config for the AI profile (base demo + SUSE AI analog:
# Ollama + Open WebUI + the on-prem explain wiring).
#
# Uses the SAME releaseName as the base so pointing the GitRepo at this path
# UPGRADES the existing release in place (adds ollama/open-webui, sets OLLAMA_URL)
# rather than colliding with it. takeOwnership adopts anything already deployed
# by a local `make up` / `make ai`.
defaultNamespace: fab-edge

helm:
  releaseName: edge-proof-kit
  takeOwnership: true
