# Open WebUI — the chat front-end SUSE AI ships (SUSE Application Collection).
# Points at the on-prem Ollama; prompts never leave the cluster (sovereign AI).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: fab-edge
  labels: { app: open-webui, tier: ai }
spec:
  replicas: 1
  selector: { matchLabels: { app: open-webui } }
  template:
    metadata:
      labels: { app: open-webui, tier: ai }
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports: [{ containerPort: 8080, name: http }]
          env:
            - { name: OLLAMA_BASE_URL, value: "http://ollama:11434" }
            # Demo auth: the :main image still shows a signup and defaults new
            # users to "pending" (needs admin approval) even with WEBUI_AUTH off,
            # which locks everyone out. Make every signup an active admin so the
            # demo is zero-friction. (The pod's DB is emptyDir and resets on each
            # roll, so this must be config, not a one-time DB edit.)
            - { name: WEBUI_AUTH, value: "false" }
            - { name: DEFAULT_USER_ROLE, value: "admin" }
            - { name: ENABLE_SIGNUP, value: "true" }
            # Wire in the "fab-assistant" model — an OpenAI-compatible endpoint on
            # edge-inference that grounds every chat in the LIVE fleet snapshot.
            # Ask it "which tools are at risk and what do I do?" and it answers
            # from real telemetry. On-prem end to end.
            - { name: ENABLE_OPENAI_API, value: "true" }
            - { name: OPENAI_API_BASE_URL, value: "http://edge-inference:8080/v1" }
            - { name: OPENAI_API_KEY, value: "sk-fab-local" }
            # Keep it lean for the edge demo: the default RAG stack downloads a
            # sentence-transformers embedding model from HuggingFace at startup
            # and OOMs a 1Gi pod. Route embeddings through Ollama and skip that
            # download so the pod starts fast and small.
            - { name: RAG_EMBEDDING_ENGINE, value: "ollama" }
            - { name: ENABLE_OLLAMA_API, value: "true" }
            - { name: HF_HUB_OFFLINE, value: "1" }
            - { name: WEBUI_NAME, value: "Fab Edge · SUSE AI" }
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { cpu: "1", memory: "2Gi" }
          volumeMounts:
            - { name: data, mountPath: /app/backend/data }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: fab-edge
spec:
  type: NodePort
  selector: { app: open-webui }
  ports:
    - { port: 8080, targetPort: 8080, nodePort: 30081, name: http }
