apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fab-edge
# The AI profile = the base demo + a local LLM tier (SUSE AI analog) + wiring the
# inference service to it so tools can be explained in plain language on-prem.
resources:
  - ../base
  - ollama.yaml
  - open-webui.yaml
  - allow-ollama-egress.yaml
patches:
  - target: { kind: Deployment, name: edge-inference }
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value: { name: OLLAMA_URL, value: "http://ollama:11434" }
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value: { name: OLLAMA_MODEL, value: "qwen2.5:0.5b" }
