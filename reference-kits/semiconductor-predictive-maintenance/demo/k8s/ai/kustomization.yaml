apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fab-edge
# The AI profile is a SELF-CONTAINED, ADDITIVE overlay: it adds the SUSE AI analog
# (Ollama + Open WebUI + a controlled egress policy) on top of the already-deployed
# base. It does NOT reference ../base — that keeps it usable as its own Fleet bundle
# (Fleet scopes each GitRepo path to its own directory, so a `../base` reference
# fails under Fleet). The base already sets OLLAMA_URL on edge-inference, so no
# cross-resource patch is needed here.
resources:
  - ollama.yaml
  - open-webui.yaml
  - allow-ollama-egress.yaml
